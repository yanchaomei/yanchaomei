  <!-- Header glow -->
  <rect x="300" y="45" width="240" height="36" rx="4" fill="url(#glow-emerald)"/>

  <!-- Header -->
  <circle cx="316" cy="63" r="4" fill="#10b981"/>
  <text x="328" y="68" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="600" fill="#10b981">AI INFRASTRUCTURE</text>

  <!-- Items -->
  <text x="316" y="106" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="330" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">LLM inference optimization</text>

  <text x="316" y="136" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="330" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">KV Cache scheduling</text>

  <text x="316" y="166" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="330" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Distributed training</text>

  <text x="316" y="196" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="330" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Video generation systems</text>

  <text x="316" y="226" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="330" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Serving infrastructure</text>

  <!-- Tags -->
  <rect x="316" y="250" rx="4" ry="4" width="56" height="22" fill="#132a2a" stroke="#1a4a3a" stroke-width="1"/>
  <text x="344" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#34d399" text-anchor="middle">Python</text>

  <rect x="380" y="250" rx="4" ry="4" width="60" height="22" fill="#132a2a" stroke="#1a4a3a" stroke-width="1"/>
  <text x="410" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#34d399" text-anchor="middle">PyTorch</text>

  <rect x="448" y="250" rx="4" ry="4" width="52" height="22" fill="#132a2a" stroke="#1a4a3a" stroke-width="1"/>
  <text x="474" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#34d399" text-anchor="middle">triton</text>

  <!-- ══ Column 3: Frontier ══ -->
  <!-- Header glow -->
  <rect x="580" y="45" width="240" height="36" rx="4" fill="url(#glow-violet)"/>

  <!-- Header -->
  <circle cx="596" cy="63" r="4" fill="#8b5cf6"/>
  <text x="608" y="68" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="600" fill="#8b5cf6">FRONTIER</text>

  <!-- Items -->
  <text x="596" y="106" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="610" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Agent memory systems</text>

  <text x="596" y="136" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="610" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Retrieval acceleration</text>

  <text x="596" y="166" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="610" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Multimodal agents</text>

  <text x="596" y="196" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="610" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Research agents</text>

  <text x="596" y="226" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="610" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Agentic workflows</text>

  <!-- Tags -->
  <rect x="596" y="250" rx="4" ry="4" width="44" height="22" fill="#231a38" stroke="#352a5c" stroke-width="1"/>
  <text x="618" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#a78bfa" text-anchor="middle">MCP</text>

  <rect x="648" y="250" rx="4" ry="4" width="42" height="22" fill="#231a38" stroke="#352a5c" stroke-width="1"/>
  <text x="669" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#a78bfa" text-anchor="middle">RAG</text>

  <rect x="698" y="250" rx="4" ry="4" width="70" height="22" fill="#231a38" stroke="#352a5c" stroke-width="1"/>
  <text x="733" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#a78bfa" text-anchor="middle">LangGraph</text>

  <!-- Bottom connector line -->
  <line x1="60" y1="300" x2="780" y2="300" stroke="url(#line1)" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="420" y="340" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="11" fill="#484f58" text-anchor="middle" letter-spacing="1.5">from storage engines → to intelligent agents</text>

  <!-- Decorative dots on the line -->
  <circle cx="140" cy="300" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="420" cy="300" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="700" cy="300" r="3" fill="#8b5cf6" opacity="0.6"/>
</svg>
