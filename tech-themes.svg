<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="380" rx="12" fill="url(#bg)"/>
  <rect width="840" height="380" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Subtle grid lines -->
  <line x1="280" y1="50" x2="280" y2="340" stroke="#21262d" stroke-width="1"/>
  <line x1="560" y1="50" x2="560" y2="340" stroke="#21262d" stroke-width="1"/>

  <!-- Connection lines between columns -->
  <path d="M265 120 Q280 120 295 100" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2" fill="none"/>
  <path d="M265 160 Q300 140 295 140" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2" fill="none"/>
  <path d="M545 100 Q560 100 575 100" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2" fill="none"/>
  <path d="M545 180 Q580 160 575 140" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2" fill="none"/>

  <!-- ══ Column 1: Systems Layer ══ -->
  <!-- Header glow -->
  <rect x="20" y="45" width="240" height="36" rx="4" fill="url(#glow-blue)"/>

  <!-- Header -->
  <circle cx="36" cy="63" r="4" fill="#3b82f6"/>
  <text x="48" y="68" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="600" fill="#3b82f6">SYSTEMS LAYER</text>

  <!-- Items -->
  <text x="36" y="106" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="50" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Storage engines</text>

  <text x="36" y="136" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="50" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">KV stores (LSM / B-Tree)</text>

  <text x="36" y="166" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="50" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Transaction processing</text>

  <text x="36" y="196" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="50" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">Disaggregated memory</text>

  <text x="36" y="226" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#8b949e">›</text>
  <text x="50" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#c9d1d9">RDMA / CXL / PMEM</text>

  <!-- Tags -->
  <rect x="36" y="250" rx="4" ry="4" width="52" height="22" fill="#1a2332" stroke="#1f3a5f" stroke-width="1"/>
  <text x="62" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#58a6ff" text-anchor="middle">C/C++</text>

  <rect x="96" y="250" rx="4" ry="4" width="44" height="22" fill="#1a2332" stroke="#1f3a5f" stroke-width="1"/>
  <text x="118" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#58a6ff" text-anchor="middle">Rust</text>

  <rect x="148" y="250" rx="4" ry="4" width="50" height="22" fill="#1a2332" stroke="#1f3a5f" stroke-width="1"/>
  <text x="173" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#58a6ff" text-anchor="middle">CUDA</text>

