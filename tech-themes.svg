<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" fill="none">
  <defs>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="380" rx="12" fill="#ffffff"/>
  <rect width="840" height="380" rx="12" stroke="#e5e7eb" stroke-width="1" fill="none"/>

  <!-- Subtle grid lines -->
  <line x1="280" y1="50" x2="280" y2="340" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="560" y1="50" x2="560" y2="340" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Connection lines between columns -->
  <path d="M265 120 Q280 120 295 100" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <path d="M265 160 Q300 140 295 140" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <path d="M545 100 Q560 100 575 100" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <path d="M545 180 Q580 160 575 140" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.15" fill="none"/>

  <!-- ══ Column 1: Systems Layer ══ -->
  <rect x="20" y="45" width="240" height="36" rx="4" fill="url(#glow-blue)"/>
  <circle cx="36" cy="63" r="4" fill="#3b82f6"/>
  <text x="48" y="68" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="600" fill="#2563eb">SYSTEMS LAYER</text>

  <text x="36" y="106" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="50" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Storage engines</text>

  <text x="36" y="136" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="50" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">KV stores (LSM / B-Tree)</text>

  <text x="36" y="166" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="50" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Transaction processing</text>

  <text x="36" y="196" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="50" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Disaggregated memory</text>

  <text x="36" y="226" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="50" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">RDMA / CXL / PMEM</text>

  <!-- Tags -->
  <rect x="36" y="250" rx="4" ry="4" width="52" height="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="62" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#2563eb" text-anchor="middle">C/C++</text>

  <rect x="96" y="250" rx="4" ry="4" width="44" height="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="118" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#2563eb" text-anchor="middle">Rust</text>

  <rect x="148" y="250" rx="4" ry="4" width="50" height="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="173" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#2563eb" text-anchor="middle">CUDA</text>

  <!-- ══ Column 2: AI Infrastructure ══ -->
  <rect x="300" y="45" width="240" height="36" rx="4" fill="url(#glow-emerald)"/>
  <circle cx="316" cy="63" r="4" fill="#10b981"/>
  <text x="328" y="68" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="600" fill="#059669">AI INFRASTRUCTURE</text>

  <text x="316" y="106" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="330" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">LLM inference optimization</text>

  <text x="316" y="136" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="330" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">KV Cache scheduling</text>

  <text x="316" y="166" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="330" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Distributed training</text>

  <text x="316" y="196" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="330" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Video generation systems</text>

  <text x="316" y="226" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="330" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Serving infrastructure</text>

  <!-- Tags -->
  <rect x="316" y="250" rx="4" ry="4" width="56" height="22" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="344" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#059669" text-anchor="middle">Python</text>

  <rect x="380" y="250" rx="4" ry="4" width="60" height="22" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="410" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#059669" text-anchor="middle">PyTorch</text>

  <rect x="448" y="250" rx="4" ry="4" width="52" height="22" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="474" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#059669" text-anchor="middle">triton</text>

  <!-- ══ Column 3: Frontier ══ -->
  <rect x="580" y="45" width="240" height="36" rx="4" fill="url(#glow-violet)"/>
  <circle cx="596" cy="63" r="4" fill="#8b5cf6"/>
  <text x="608" y="68" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="600" fill="#7c3aed">FRONTIER</text>

  <text x="596" y="106" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="610" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Agent memory systems</text>

  <text x="596" y="136" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="610" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Retrieval acceleration</text>

  <text x="596" y="166" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="610" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Multimodal agents</text>

  <text x="596" y="196" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="610" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Research agents</text>

  <text x="596" y="226" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="12" fill="#c0c0c0">›</text>
  <text x="610" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" fill="#374151">Agentic workflows</text>

  <!-- Tags -->
  <rect x="596" y="250" rx="4" ry="4" width="44" height="22" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="618" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#7c3aed" text-anchor="middle">MCP</text>

  <rect x="648" y="250" rx="4" ry="4" width="42" height="22" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="669" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#7c3aed" text-anchor="middle">RAG</text>

  <rect x="698" y="250" rx="4" ry="4" width="70" height="22" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="733" y="265" font-family="'SF Mono',monospace" font-size="10" fill="#7c3aed" text-anchor="middle">LangGraph</text>

  <!-- Bottom connector line -->
  <line x1="60" y1="300" x2="780" y2="300" stroke="url(#line1)" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="420" y="340" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="11" fill="#9ca3af" text-anchor="middle" letter-spacing="1.5">from storage engines → to intelligent agents</text>

  <!-- Decorative dots on the line -->
  <circle cx="140" cy="300" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="420" cy="300" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="700" cy="300" r="3" fill="#8b5cf6" opacity="0.5"/>
</svg>
